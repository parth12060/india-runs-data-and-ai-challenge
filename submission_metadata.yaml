# ============================================================================
# AI tools declaration (transparency only — declared use is NOT penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture design (how to fuse the structured Option A ranker
  with the Option B embedding layer), honeypot-detector calibration against the
  real pool, code review, and packaging. All ranking logic is explicit, human-owned
  code (config/features/honeypot/semantic/rank). No candidate data was sent to any
  hosted LLM, and no LLM is called during the ranking step (CPU-only, no network).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker: a structured feature model (Option A) is the backbone; a
  precomputed semantic layer (Option B) is fused in as one weighted feature.
  Option A scores title+career fit (the decisive anti-stuffer signal),
  trust-weighted skills (proficiency x duration x endorsements), experience-band
  fit, product-vs-consulting, location, and education, with explicit penalties
  (keyword-stuffer, consulting-only, pure-research, CV/speech-only, job-hopper)
  and a bounded behavioral-availability multiplier from redrob_signals. Option B
  contributes semantic_fit = blend of dense embedding cosine (sentence-transformers,
  precomputed offline) and BM25, min-max normalized across the pool; it surfaces
  strong-but-quietly-worded candidates that keyword matching misses. A high-precision
  honeypot gate (internal-contradiction rules) zeroes impossible profiles. All 100K
  are scored in one ~30s CPU pass (peak <0.5 GB), so recall is perfect and the
  embedding never overrides the structured penalties. Honeypot rate in the top 100: 0%.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
